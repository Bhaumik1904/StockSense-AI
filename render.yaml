# Render deployment configuration
services:
  - type: web
    name: stocksense-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: DATABASE_URL
        sync: false          # You will paste this from Supabase
      - key: FLASK_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: RZP_KEY_ID
        sync: false
      - key: RZP_KEY_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
